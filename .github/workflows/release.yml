name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Get patchnotes
        id: patchnotes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" HEAD)
          else
            NOTES=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish Windows
        run: |
          dotnet publish -r win-x64 -c Release --self-contained \
            -p:PublishSingleFile=true -p:DebugType=none \
            -o publish/win-x64

      - name: Publish macOS (Apple Silicon)
        run: |
          dotnet publish -r osx-arm64 -c Release --self-contained \
            -p:PublishSingleFile=true -p:DebugType=none \
            -o publish/osx-arm64

      - name: Publish macOS (Intel)
        run: |
          dotnet publish -r osx-x64 -c Release --self-contained \
            -p:PublishSingleFile=true -p:DebugType=none \
            -o publish/osx-x64

      - name: Publish Linux
        run: |
          dotnet publish -r linux-x64 -c Release --self-contained \
            -p:PublishSingleFile=true -p:DebugType=none \
            -o publish/linux-x64

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}
          cd publish
          zip -r ../no-more-cats-${VERSION}-win-x64.zip win-x64/
          tar -czf ../no-more-cats-${VERSION}-osx-arm64.tar.gz osx-arm64/
          tar -czf ../no-more-cats-${VERSION}-osx-x64.tar.gz osx-x64/
          tar -czf ../no-more-cats-${VERSION}-linux-x64.tar.gz linux-x64/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.patchnotes.outputs.NOTES }}
          files: |
            no-more-cats-*.zip
            no-more-cats-*.tar.gz
