name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  patchnotes:
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.notes.outputs.NOTES }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get patchnotes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" HEAD)
          else
            NOTES=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  build:
    needs: patchnotes
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: no-more-cats.exe
            archive_cmd: Compress-Archive -Path publish/* -DestinationPath
            archive_ext: zip
          - os: macos-latest
            rid: osx-arm64
            artifact: no-more-cats
            archive_cmd: tar -czf
            archive_ext: tar.gz
          - os: macos-13
            rid: osx-x64
            artifact: no-more-cats
            archive_cmd: tar -czf
            archive_ext: tar.gz
          - os: ubuntu-latest
            rid: linux-x64
            artifact: no-more-cats
            archive_cmd: tar -czf
            archive_ext: tar.gz

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish -r ${{ matrix.rid }} -c Release --self-contained -p:PublishSingleFile=true -p:DebugType=none -o publish

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION=${GITHUB_REF_NAME}
          tar -czf no-more-cats-${VERSION}-${{ matrix.rid }}.tar.gz -C publish .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME
          Compress-Archive -Path publish/* -DestinationPath "no-more-cats-${VERSION}-${{ matrix.rid }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: no-more-cats-*.*

  release:
    needs: [patchnotes, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ needs.patchnotes.outputs.notes }}
          files: no-more-cats-*.*
